# ── RoadGuard AI – Docker Compose ──────────────────────────────────────────
# Orchestrates: MongoDB, Backend (Node.js), AI Service (FastAPI), Frontend (React)
#
# Usage:
#   docker compose up --build
#
# Services:
#   mongo      – MongoDB 7 (data persisted in named volume)
#   backend    – Node.js/Express API (port 5000)
#   ai-service – FastAPI YOLOv8 inference (port 8000)
#   frontend   – Nginx-served React app (port 80)

version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: roadguard-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js + Express) ──────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: roadguard-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/roadguard
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: production
    ports:
      - '5000:5000'
    volumes:
      - uploads_data:/app/uploads

  # ── AI Service (FastAPI + YOLOv8) ───────────────────────────────────────
  ai-service:
    build:
      context: ../ai-service
      dockerfile: ../docker/Dockerfile.ai
    container_name: roadguard-ai
    restart: unless-stopped
    environment:
      AI_HOST: 0.0.0.0
      AI_PORT: 8000
      MODEL_PATH: model/best.pt
    ports:
      - '8000:8000'
    volumes:
      - ./model:/app/model:ro  # Mount trained model weights

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: roadguard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  mongo_data:
  uploads_data:
